<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
	<title>SillyKey</title>
	<link rel="icon" href="favicon.png" sizes="16x16">
	<link rel="apple-touch-icon" href="apple-touch-icon.png">
	<meta name="apple-mobile-web-app-title" content="SillyKey">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<div id="bg-a" class="bg-layer"></div>
	<div id="bg-b" class="bg-layer"></div>

	<div id="copy-feedback">Copied</div>

	<div id="car_key">
		<div id="car_key_display">
			<div id="status_bar">
				<span class="icon-signal" style="width:10px;height:10px;display:inline-block;"></span>
				<span class="icon-lock" style="width:10px;height:10px;display:inline-block;"></span>
				<span class="status-right">
					<span class="icon-battery" style="width:14px;height:10px;display:inline-block;"></span>
				</span>
			</div>

			<div class="method-row">
				<select id="method">
					<option value="legacy">Legacy</option>
					<option value="hmac">HMAC</option>
					<option value="hmac-clean">HMAC-clean</option>
					<option value="pbkdf2">PBKDF2</option>
					<option value="pbkdf2-58">PBKDF2-58</option>
				</select>
			</div>

			<div class="master-row">
				<input id="master" type="password" placeholder="master" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
				<img id="hash_icon" src="" alt="">
				<button class="btn-icon" id="btn-eye" type="button" aria-label="Toggle password visibility"></button>
			</div>

			<div class="input-row">
				<div class="service-col">
					<input id="service" type="text" placeholder="service" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
				</div>
				<div class="year-col">
					<select id="year"></select>
				</div>
			</div>

			<div class="password-row">
				<input id="password" type="text" value="" placeholder="password" autocomplete="off" readonly>
				<button class="btn-icon btn-dice" id="btn-dice" type="button" aria-label="Generate random password"></button>
				<button class="btn-icon btn-copy" id="btn-copy" type="button" aria-label="Copy password"></button>
			</div>

			<div class="generating-indicator">Generating</div>
		</div>
	</div>

	<div class="bash-formula">
		<div class="bash-formula-label">bash equivalent:</div>
		<div class="bash-formula-code">
			<code id="bash-code"></code>
			<button class="btn-copy-bash" id="btn-copy-bash" type="button" aria-label="Copy bash command"></button>
		</div>
	</div>

	<script src="sha256.min.js"></script>
	<script src="base58.js"></script>
	<script src="identicon.js"></script>
	<script src="app.js"></script>
</body>
</html>
