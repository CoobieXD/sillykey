<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<title>SillyKey</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<div class="container">
		<input id="master" type="password" placeholder="master" autocomplete="off">
		<div class="input-row">
			<div class="service-col">
				<input id="service" type="text" placeholder="service" autocomplete="off">
			</div>
			<div class="year-col">
				<select id="year"></select>
			</div>
		</div>
		<div class="password-row">
			<input id="password" type="text" value="" placeholder="password" readonly>
			<button class="btn-copy" id="btn-copy" type="button">Copy</button>
		</div>
	</div>

	<script src="sha256.min.js"></script>
	<script src="base58.js"></script>
	<script src="app.js"></script>
</body>
</html>
